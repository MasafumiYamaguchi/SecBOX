services:
  backend:
    build:
      context: ./backend
    container_name: secbox-backend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: secbox-frontend
    environment:
      NODE_ENV: development
      VITE_PROXY_TARGET: "http://backend:3000"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
